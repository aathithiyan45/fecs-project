version: '3.8'

services:
  postgres:
    image: postgres:16.13
    container_name: fecs_postgres
    environment:
      POSTGRES_DB: fecs_db
      POSTGRES_USER: fecs_user
      POSTGRES_PASSWORD: fecs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fecs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fecs_user -d fecs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: fecs_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - fecs_network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fecs_backend
    environment:
      DATABASE_URL: postgresql+psycopg://fecs_user:fecs_password@postgres:5432/fecs_db
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_INCOMING_TOPIC: fecs/incoming
      MQTT_ACK_TOPIC: fecs/ack
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DUPLICATE_TIME_THRESHOLD_SECONDS: 10
      DUPLICATE_DISTANCE_THRESHOLD_METERS: 10
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - fecs_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fecs_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fecs_network
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  fecs_network:
    driver: bridge
